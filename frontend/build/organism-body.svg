  <!-- Right arm -->
  <path d="M152 80 Q180 120 188 170 Q192 200 185 220" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.2"/>
  <!-- Left leg -->
  <path d="M90 270 Q85 320 80 380 Q78 420 82 450" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.2"/>
  <!-- Right leg -->
  <path d="M150 270 Q155 320 160 380 Q162 420 158 450" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.2"/>
  <!-- Organ positions (reference circles) -->
  <circle cx="120" cy="40" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <circle cx="120" cy="155" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <circle cx="120" cy="185" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <circle cx="130" cy="230" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <circle cx="110" cy="230" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <circle cx="120" cy="265" r="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="0.5"/>
  <!-- Energy lines between organs -->
  <line x1="120" y1="40" x2="120" y2="155" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="120" y1="155" x2="120" y2="185" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="120" y1="185" x2="130" y2="230" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="120" y1="185" x2="110" y2="230" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="130" y1="230" x2="120" y2="265" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="110" y1="230" x2="120" y2="265" stroke="rgba(59,130,246,0.06)" stroke-width="0.5" stroke-dasharray="2 2"/>
</svg>
