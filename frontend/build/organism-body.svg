<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 480" width="240" height="480">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="50%" stop-color="rgba(168,85,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.08)"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <ellipse cx="120" cy="30" rx="32" ry="28" fill="none" stroke="rgba(148,163,184,0.25)" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="108" cy="28" r="3" fill="rgba(59,130,246,0.15)"/>
  <circle cx="132" cy="28" r="3" fill="rgba(59,130,246,0.15)"/>
  <!-- Neck -->
  <rect x="110" y="52" width="20" height="18" rx="4" fill="none" stroke="rgba(148,163,184,0.2)" stroke-width="1"/>
  <!-- Torso -->
  <path d="M88 70 Q85 160 82 220 Q80 260 90 280 L150 280 Q160 260 158 220 Q155 160 152 70 Z" fill="url(#bodyGrad)" stroke="rgba(148,163,184,0.2)" stroke-width="1.2"/>
